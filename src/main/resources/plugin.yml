name: KaramSMP
version: '1.8'
main: me.herex.karmsmp.KaramSMP
api-version: '1.21'
author: Herex._.7
softdepend: [PlaceholderAPI]
description: Adds /gmsp toggle, nightvision, shop GUI, auction house, stats, balances, shards, bounties, most money GUI, AFK room rewards, /pay, optimized RTP, ClearLag, /settings GUI, TAB, ranks, placeholders, databases, regions, scoreboards, homes, spawn, double jump, guide/store, and Discord.
commands:
  gmsp:
    description: Toggle yourself between spectator mode and survival mode.
    usage: /gmsp
    aliases:
      - karamsmpgmsp
      - gsmp
  nightvision:
    description: Toggle night vision on or off.
    usage: /nightvision
    aliases:
      - nv
  reload:
    description: Reload the KaramSMP plugin.
    usage: /reload
    aliases:
      - ksmpreload
      - karamsmpreload
  discord:
    description: Shows the server Discord invite.
    usage: /discord
    aliases:
      - dc
      - disc
      - discordserver
  guide:
    description: Shows the server guide link.
    usage: /guide
    aliases:
      - karamsmpguide
  store:
    description: Shows the server store link.
    usage: /store
    aliases:
      - karamsmpstore
  shop:
    description: Opens the KaramSMP shop GUI.
    usage: /shop [reload]
    aliases:
      - market
      - donutshop
  auction:
    description: Opens the KaramSMP auction house.
    usage: /auction [sell|search|mine|transactions|reload]
    aliases:
      - ah
      - auctions
  sell:
    description: Sell the item in your hand or open the sell GUI.
    usage: /sell [price]
    aliases:
      - auctionsell
      - ahsell
  adminshop:
    description: Opens the KaramSMP admin shop editor.
    usage: /adminshop
    aliases:
      - shopadmin
      - ashop
  home:
    description: Opens your homes GUI or teleports to a home.
    usage: /home [name]
    aliases:
      - homes
  sethome:
    description: Sets a new home.
    usage: /sethome <name>
  delhome:
    description: Deletes one of your homes.
    usage: /delhome <name>
    aliases:
      - deletehome
      - removehome
  spawn:
    description: Teleport to the server spawn.
    usage: /spawn
  setspawn:
    description: Set the server spawn.
    usage: /setspawn
  stats:
    description: Opens the player stats GUI.
    usage: /stats [player]
    aliases:
      - stat
      - mystats
  settings:
    description: Opens the player settings GUI.
    usage: /settings
    aliases:
      - options
      - preferences
  pay:
    description: Pay another player money.
    usage: /pay <player> <amount>
  blance:
    description: Shows your balance or another player's balance.
    usage: /blance [player|add|remove|set] [player] [amount]
    aliases:
      - balance
      - bal
      - money
  rtp:
    description: Opens the random teleport GUI.
    usage: /rtp
    aliases:
      - randomtp
      - randomteleport
  mostmoney:
    description: Opens the most money leaderboard GUI.
    usage: /mostmoney
    aliases:
      - baltop
      - moneytop
      - balancetop
  paltop:
    description: Opens the most money leaderboard GUI.
    usage: /paltop
  bounty:
    description: Opens the bounties GUI or adds a bounty.
    usage: /bounty [add <player> <amount>]
    aliases:
      - bounties
  afk:
    description: Teleports you to or from the AFK room.
    usage: /afk
  setafkroom:
    description: Sets the AFK room location.
    usage: /setafkroom
  clearlag:
    description: Shows or runs the KaramSMP ClearLag cleaner.
    usage: /clearlag [time|now|reload]
    aliases:
      - lagclear
      - clearitems
      - itemclear
  rank:
    description: Manage KaramSMP ranks and player rank assignments.
    usage: /rank help
    aliases:
      - ranks
      - ksmprank
  region:
    description: Manage KaramSMP regions and protection flags.
    usage: /region help
    aliases:
      - regions
      - rg
      - kregion
      - kregions
      - ksmpregion
  kscoreboard:
    description: Manage KaramSMP scoreboards.
    usage: /kscoreboard help
    aliases:
      - scoreboards
      - sb
      - karamsmpscoreboard
permissions:
  karamsmp.auction.use:
    description: Allows a player to use the KaramSMP auction house.
    default: true
  karamsmp.auction.sell:
    description: Allows a player to sell items in the KaramSMP auction house.
    default: true
  karamsmp.auction.admin:
    description: Allows a player to reload/admin the KaramSMP auction house.
    default: op
  karamsmp.auction.bypasslimit:
    description: Allows a player to bypass normal auction listing limits.
    default: op
  karamsmp.afk.set:
    description: Allows a player to set the AFK room.
    default: op
  karamsmp.bounty.use:
    description: Allows a player to open and use bounties.
    default: true
  karamsmp.leaderboards.use:
    description: Allows a player to open leaderboard GUIs.
    default: true
  karamsmp.shop.use:
    description: Allows a player to use /shop when shop.permission is set to karamsmp.shop.use.
    default: true
  karamsmp.shop.admin:
    description: Allows a player to reload and edit the KaramSMP shop.
    default: op
  karamsmp.settings.admin:
    description: Reserved permission for future KaramSMP settings admin tools.
    default: op
  karamsmp.clearlag.admin:
    description: Allows a player to run and reload KaramSMP ClearLag.
    default: op
  karamsmp.balance.others:
    description: Allows checking other players' balances with /blance <player>.
    default: op
  karamsmp.balance.admin:
    description: Allows staff to use /blance add, remove, and set.
    default: op
  karamsmp.rtp.admin:
    description: Allows using /rtp <section> directly.
    default: op
  karamsmp.spawn.set:
    description: Allows a player to set the server spawn.
    default: op
  karamsmp.homes.vip:
    description: Example permission you can use in config.yml to give more homes.
    default: false
  karamsmp.scoreboard.staff:
    description: Allows a player to see the staff scoreboard example.
    default: false
  karamsmp.scoreboards.admin:
    description: Allows a player to manage KaramSMP scoreboards.
    default: op
  karamsmp.discord:
    description: Allows a player to use /discord when discord.permission is set to karamsmp.discord.
    default: true
  karamsmp.helper.gmsp:
    description: Allows a player to use /gmsp and toggle spectator mode.
    default: op
  karamsmp.reload:
    description: Allows a player to reload KaramSMP.
    default: op
  karamsmp.admin:
    description: Gives access to every KaramSMP admin feature.
    default: op
    children:
      karamsmp.reload: true
      karamsmp.admin.ranks: true
      karamsmp.regions.admin: true
      karamsmp.regions.bypass: true
      karamsmp.scoreboards.admin: true
      karamsmp.spawn.set: true
      karamsmp.helper.gmsp: true
      karamsmp.discord: true
      karamsmp.balance.others: true
      karamsmp.balance.admin: true
      karamsmp.rtp.admin: true
      karamsmp.settings.admin: true
      karamsmp.clearlag.admin: true
      karamsmp.shop.admin: true
      karamsmp.shop.use: true
      karamsmp.auction.use: true
      karamsmp.auction.sell: true
      karamsmp.auction.admin: true
      karamsmp.auction.bypasslimit: true
      karamsmp.afk.set: true
      karamsmp.bounty.use: true
      karamsmp.leaderboards.use: true
  karamsmp.admin.ranks:
    description: Allows a player to manage KaramSMP ranks and player ranks.
    default: op
  karamsmp.regions.admin:
    description: Allows a player to manage all KaramSMP region commands.
    default: op
    children:
      karamsmp.regions.wand: true
      karamsmp.regions.create: true
      karamsmp.regions.delete: true
      karamsmp.regions.list: true
      karamsmp.regions.info: true
      karamsmp.regions.flag: true
      karamsmp.regions.owner: true
      karamsmp.regions.member: true
      karamsmp.regions.priority: true
      karamsmp.regions.redefine: true
      karamsmp.regions.resize: true
      karamsmp.regions.message: true
      karamsmp.regions.rename: true
      karamsmp.regions.teleport: true
      karamsmp.regions.save: true
      karamsmp.regions.reload: true
  karamsmp.regions.bypass:
    description: Bypasses KaramSMP region protections.
    default: op
  karamsmp.regions.wand:
    description: Allows use of the region selection wand.
    default: op
  karamsmp.regions.create:
    description: Allows creating regions.
    default: op
  karamsmp.regions.delete:
    description: Allows deleting regions.
    default: op
  karamsmp.regions.list:
    description: Allows listing regions.
    default: op
  karamsmp.regions.info:
    description: Allows viewing region information.
    default: op
  karamsmp.regions.flag:
    description: Allows editing region flags.
    default: op
  karamsmp.regions.owner:
    description: Allows editing region owners.
    default: op
  karamsmp.regions.member:
    description: Allows editing region members.
    default: op
  karamsmp.regions.priority:
    description: Allows editing region priority.
    default: op
  karamsmp.regions.redefine:
    description: Allows redefining regions from a selection.
    default: op
  karamsmp.regions.resize:
    description: Allows expanding and contracting regions.
    default: op
  karamsmp.regions.message:
    description: Allows editing region greeting and farewell messages.
    default: op
  karamsmp.regions.rename:
    description: Allows renaming regions.
    default: op
  karamsmp.regions.teleport:
    description: Allows teleporting to a region center.
    default: op
  karamsmp.regions.save:
    description: Allows saving regions.yml.
    default: op
  karamsmp.regions.reload:
    description: Allows reloading regions.yml.
    default: op
  karamsmp.rank.owner:
    description: Owner rank permission.
    default: false
  karamsmp.rank.manager:
    description: Manager rank permission.
    default: false
  karamsmp.rank.developer:
    description: Developer rank permission.
    default: false
  karamsmp.rank.sradmin:
    description: Senior admin rank permission.
    default: false
  karamsmp.rank.admin:
    description: Admin rank permission.
    default: false
  karamsmp.rank.srmod:
    description: Senior moderator rank permission.
    default: false
  karamsmp.rank.mod:
    description: Moderator rank permission.
    default: false
  karamsmp.rank.jrhelper:
    description: Junior helper rank permission.
    default: false
  karamsmp.rank.helper:
    description: Helper rank permission.
    default: false
