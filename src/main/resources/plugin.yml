name: KaramSMP
version: '0.2'
main: me.herex.karmsmp.KaramSMP
api-version: '1.21'
author: Herex._.7
softdepend: [PlaceholderAPI]
description: Adds /gmsp, /gms, configurable TAB, and rank prefixes/suffixes.
commands:
  gmsp:
    description: Switch yourself to spectator mode.
    usage: /gmsp
    aliases:
      - Karamsmpcore:gmsp
  gms:
    description: Switch yourself back to survival mode.
    usage: /gms
    aliases:
      - Karamsmpcore:gms
  reload:
    description: Reload the KaramSMP plugin.
    usage: /reload
    aliases:
      - Karamsmpcore:reload
      - karamsmpreload
      - ksmpreload
  rank:
    description: Manage KaramSMP ranks and player ranks.
    usage: /rank <list|info|set|clear|create|remove|setprefix|setsuffix|addperm|delperm>
    aliases:
      - ranks
      - ksmprank
permissions:
  karamsmp.helper.gmsp:
    description: Allows a player to use /gmsp and switch to spectator mode.
    default: op
  karamsmp.reload:
    description: Allows a player to reload the KaramSMP plugin.
    default: op
  karamsmp.admin:
    description: Gives access to every KaramSMP admin permission.
    default: op
    children:
      karamsmp.reload: true
      karamsmp.admin.ranks: true
      karamsmp.helper.gmsp: true
  karamsmp.admin.ranks:
    description: Allows a player to manage KaramSMP ranks and player ranks.
    default: op
  karamsmp.rank.owner:
    description: Example owner rank permission.
    default: false
  karamsmp.rank.helper:
    description: Example helper rank permission.
    default: false
