# Random Teleport System
rtp:
  enabled: true
  teleport-delay-seconds: 5
  default-min-radius: 250
  default-max-radius: 5000
  attempts: 64
  # How many safe-location checks are done each tick after the countdown. Lower = less lag/freezing.
  attempts-per-tick: 2
  gui:
    title: "&8КҖбҙҖЙҙбҙ…бҙҸбҙҚ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ"
    rows: 3
  sounds:
    teleported:
      name: "ENTITY_ENDERMAN_TELEPORT"
      volume: 1.0
      pitch: 1.2
    cancelled:
      name: "BLOCK_PRESSURE_PLATE_CLICK_ON"
      volume: 1.0
      pitch: 1.0
  messages:
    only-players: "&cOnly players can use this command."
    disabled: "&cRandom teleport is disabled."
    already-teleporting: "&8вҖў &bКҖбҙӣбҙҳ &8В» &cYou are already teleporting."
    world-disabled: "&8вҖў &bКҖбҙӣбҙҳ &8В» &cThat random teleport world is disabled."
    world-not-found: "&8вҖў &bКҖбҙӣбҙҳ &8В» &cWorld &e%world% &cwas not found."
    no-safe-location: "&8вҖў &bКҖбҙӣбҙҳ &8В» &cCould not find a safe location. Try again."
    searching: "&8вҖў &bКҖбҙӣбҙҳ &8В» &7Finding a safe location..."
    teleport-start: "&8вҖў &bКҖбҙӣбҙҳ &8В» &7бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣЙӘЙҙЙў ЙӘЙҙ &b%seconds% &7sбҙҮбҙ„бҙҸЙҙбҙ…s бҙӣбҙҸ &e%world%&7. &8(бҙ…бҙҸЙҙ'бҙӣ бҙҚбҙҸбҙ бҙҮ!)"
    teleport-cancelled: "&8вҖў &bКҖбҙӣбҙҳ &8В» &cбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ… КҷбҙҮбҙ„бҙҖбҙңкңұбҙҮ КҸбҙҸбҙң бҙҚбҙҸбҙ бҙҮбҙ…!"
    teleported: "&8вҖў &bКҖбҙӣбҙҳ &8В» &aTeleported to &e%world%&a."
    actionbar-countdown: "&bКҖбҙӣбҙҳ ЙӘЙҙ &f%seconds% &bкңұбҙҮбҙ„бҙҸЙҙбҙ…кңұ..."
    actionbar-cancelled: "&cКҖбҙӣбҙҳ бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ… (бҙҚбҙҸбҙ бҙҮбҙ…)!"
    actionbar-teleported: "&aКҖбҙҖЙҙбҙ…бҙҸбҙҚ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣбҙҮбҙ…!"
  worlds:
    overworld:
      enabled: true
      display-name: "&aбҙҸбҙ бҙҮКҖбҙЎбҙҸКҖКҹбҙ…"
      world: "world"
      slot: 11
      material: "GRASS_BLOCK"
      name: "&a&lбҙҸбҙ бҙҮКҖбҙЎбҙҸКҖКҹбҙ…"
      lore:
        - "&fClick to randomly teleport"
      min-radius: 250
      max-radius: 5000
      attempts: 64
      avoid-water: true
    nether:
      enabled: true
      display-name: "&cЙҙбҙҮбҙӣКңбҙҮКҖ"
      world: "world_nether"
      slot: 13
      material: "NETHERRACK"
      name: "&c&lЙҙбҙҮбҙӣКңбҙҮКҖ"
      lore:
        - "&fClick to randomly teleport"
      min-radius: 250
      max-radius: 3000
      attempts: 96
      min-y: 32
      max-y: 119
      avoid-water: false
    end:
      enabled: true
      display-name: "&eбҙҮЙҙбҙ…"
      world: "world_the_end"
      slot: 15
      material: "END_STONE"
      name: "&e&lбҙҮЙҙбҙ…"
      lore:
        - "&fClick to randomly teleport"
      min-radius: 250
      max-radius: 4000
      attempts: 96
      min-y: 1
      max-y: 255
      avoid-water: true

# Text System
# Removes hidden zero-width characters from fancy copied text so TAB/scoreboard does not display broken boxes.
text:
  remove-zero-width-characters: false

# Tab System
tab:
  enabled: true
  update-interval-seconds: 4
  # Forces higher rank priorities to appear above lower ranks in TAB.
  force-rank-priority-sorting: true
  header:
    - "&b&lKaram SMP"
    - "&f%online% Players"
    - ""
  footer:
    - ""
    - "&#00D5FF/бҙ…ЙӘкңұбҙ„бҙҸКҖбҙ… &f/ЙўбҙңЙӘбҙ…бҙҮ &#00D5FF/кңұбҙӣбҙҸКҖбҙҮ"

# Join Message System
join-messages:
  enabled: true
  message: "&8[&a+&8] %karamsmp_ranks_prefix%%player% &ejoined the server."
  first-join-enabled: false
  first-join-message: "&8[&a+&8] %karamsmp_ranks_prefix%%player%%karamsmp_ranks_suffix% &7joined for the first time. &eWelcome!"
  # Keeps the player name clean after the rank prefix. Set to "" to let the rank color continue into the name.
  player-name-color: "&f"
  hover:
    enabled: true
    text:
      - "&b%player%"
      - "&7Rank: %karamsmp_ranks_prefix%"
      - "&7Balance: &a%balance%"
      - "&7Kills: &c%kills%"
      - "&7Deaths: &6%deaths%"
      - "&7Playtime: &e%playtime%"
      - ""
      - "&eClick to run: &f%join_click_command%"
  click:
    enabled: true
    # RUN_COMMAND runs it when clicked. SUGGEST_COMMAND puts it in chat instead.
    action: "RUN_COMMAND"
    command: "/stats %player%"

# Quit Message System
quit-messages:
  enabled: false
  message: "&8[&c-&8] %karamsmp_ranks_prefix%%player%%karamsmp_ranks_suffix% &7left the server."

# Discord Command System
discord:
  enabled: true
  permission: ""
  invite: "https://discord.gg/karamsmp"
  command-aliases:
    - "discord"
    - "dc"
    - "discordserver"
  message:
    - "&fKaram SMP Discord Server"
    - ""
    - "&b%discord_invite%"
    - ""
  disabled-message: "&cThe Discord command is disabled."
  no-permission-message: "&cYou don't have permission to use this command!"


# Guide Command System
guide:
  enabled: true
  permission: ""
  url: "https://karamsmp.net/guide"
  message:
    - "&fKaram SMP Guide"
    - ""
    - "&b%guide_url%"
    - ""
  disabled-message: "&cThe guide command is disabled."
  no-permission-message: "&cYou don't have permission to use this command!"

# Store Command System
store:
  enabled: true
  permission: ""
  url: "https://store.karamsmp.net"
  message:
    - "&fKaram SMP Store"
    - ""
    - "&b%store_url%"
    - ""
  disabled-message: "&cThe store command is disabled."
  no-permission-message: "&cYou don't have permission to use this command!"

# Night Vision Command
night-vision:
  enabled: true
  enabled-message: "&aNight vision enabled."
  disabled-message: "&cNight vision disabled."
  command-disabled-message: "&cThe night vision command is disabled."
  only-players-message: "&cOnly players can use this command."
  amplifier: 0
  show-particles: false
  show-icon: true
  ambient: false

# Name-Format System
name-format:
  display-name: "%karamsmp_ranks_prefix%%player%"
  tab-list: "%karamsmp_ranks_prefix%%player%"
  name-tag:
    enabled: true

# Chat System
chat:
  enabled: true
  format: "%karamsmp_ranks_prefix%%player%&7: &f%message%"

# Scoreboard System
scoreboards:
  enabled: true
  folder: "scoreboards"
  # 20 ticks = 1 second. Lower values update placeholders faster.
  update-interval-ticks: 20
  reset-when-no-match: false

# Region System
regions:
  enabled: true
  data-file: "regions.yml"
  wand:
    material: "GOLDEN_AXE"
    name: "&eKaramSMP Region Wand"
    # This lets old wands still work if they match material + display name.
    match-by-name: false
    # If true, any configured material held by a player with region permission works as the wand.
    # This fixes cases where the axe loses its internal plugin tag.
    match-any-configured-material: true
    lore:
      - "&7Left click a block: &eSet position 1"
      - "&7Right click a block: &eSet position 2"
      - "&8Then use &f/region create <name>"
  messages:
    send-enter-leave: true
    protected: "&cYou can't do that in region &e%region%&c."
    enter-denied: "&cYou can't enter region &e%region%&c."
    exit-denied: "&cYou can't leave region &e%region%&c."
    enter: "&aEntering &e%region%&a."
    leave: "&cLeaving &e%region%&c."
  members:
    # Owners and members can build even if block-break/block-place are false.
    bypass-build-flags: false
    # Owners and members can interact/open containers even if interact/chest-access are false.
    bypass-interact-flags: false
  defaults:
    priority: 0
    flags:
      block-break: false
      block-place: false
      pvp: false
      fall-damage: false
      interact: true
      chest-access: true
      item-drop: false
      item-pickup: false
      mob-spawning: false
      explosions: false
      fire-spread: false
      entry: true
      exit: true
      double-jump: false
  available-flags:
    - "block-break"
    - "block-place"
    - "pvp"
    - "fall-damage"
    - "interact"
    - "chest-access"
    - "item-drop"
    - "item-pickup"
    - "mob-spawning"
    - "explosions"
    - "fire-spread"
    - "entry"
    - "exit"
    - "double-jump"

# Spawn System
spawn:
  enabled: true
  data-file: "spawn.yml"
  # New players will be teleported to /setspawn location on their first join.
  teleport-first-join: true
  # Keep false if you only want first-join spawn. Set true to spawn players every join.
  teleport-on-join: false
  join-teleport-delay-ticks: 2
  messages:
    only-players: "&cOnly players can use this command."
    no-permission: "&cYou don't have permission to use this command!"
    disabled: "&cThe spawn system is disabled."
    not-set: "&cThe spawn has not been set yet."
    set: "&aSpawn has been set."
    teleported: "&aTeleported to spawn."

# Double Jump System
# Enable it inside a region using: /region flag <region> double-jump true
double-jump:
  enabled: true
  allow-outside-regions: false
  # If enabled, players can double jump around the /setspawn location even without a region.
  spawn:
    enabled: true
    radius: 50.0
  velocity-y: 0.9
  velocity-forward: 0.55
  cooldown-ticks: 10
  sound:
    name: "BLOCK_PRESSURE_PLATE_CLICK_ON"
    volume: 1.0
    pitch: 1.4

# Home System
homes:
  enabled: true
  data-file: "homes.yml"
  # same-as-database means homes use database.type: sqlite/mysql/yaml.
  storage:
    type: "same-as-database"
    sqlite-table: "player_homes"
    mysql-table: ""
  prefix: "&8вҖў &bКңбҙҸбҙҚбҙҮ &8В»"
  max-homes: 5
  teleport-delay-seconds: 5
  # Give players more homes by permission if you want. Example: karamsmp.homes.vip: 10
  permission-limits: {}
  gui:
    title: "&8вҖў &bКҸбҙҸбҙңКҖ КңбҙҸбҙҚбҙҮs"
    home-item:
      material: "GRAY_BED"
      name: "&e%home%"
      lore:
        - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ"
    delete-item:
      material: "LIGHT_BLUE_DYE"
      name: "&cбҙ…бҙҮКҹбҙҮбҙӣбҙҮ"
      lore:
        - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ…бҙҮКҹбҙҮбҙӣбҙҮ &e%home%"
    free-slot:
      material: "GRAY_BED"
      name: "&7кң°КҖбҙҮбҙҮ sКҹбҙҸбҙӣ"
      lore:
        - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ sбҙҮбҙӣ бҙҖ ЙҙбҙҮбҙЎ КңбҙҸбҙҚбҙҮ"
    empty-delete:
      material: "GRAY_DYE"
      name: "&7ЙҙбҙҸ КңбҙҸбҙҚбҙҮ"
      lore:
        - "&7ЙҙбҙҸ КңбҙҸбҙҚбҙҮ sбҙҮбҙӣ КңбҙҮКҖбҙҮ!"
    locked-slot:
      material: "RED_BED"
  confirm-delete:
    title: "&8бҙ„бҙҸЙҙкң°ЙӘКҖбҙҚ бҙ…бҙҮКҹбҙҮбҙӣбҙҮ"
    cancel-slot: 11
    home-slot: 13
    confirm-slot: 15
    cancel-item:
      material: "RED_STAINED_GLASS_PANE"
      name: "&cбҙ„бҙҖЙҙбҙ„бҙҮКҹ"
      lore:
        - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўбҙҸ КҷбҙҖбҙ„бҙӢ"
    home-item:
      material: "GRAY_BED"
      name: "&e%home%"
      lore:
        - "&7КҸбҙҸбҙң бҙҖКҖбҙҮ бҙ…бҙҮКҹбҙҮбҙӣЙӘЙҙЙў бҙӣКңЙӘкңұ КңбҙҸбҙҚбҙҮ"
    confirm-item:
      material: "LIME_STAINED_GLASS_PANE"
      name: "&aбҙ„бҙҸЙҙкң°ЙӘКҖбҙҚ"
      lore:
        - "&7бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ…бҙҮКҹбҙҮбҙӣбҙҮ &e%home%"
    confirm:
      sound: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0
      give-exp-levels: 0
    cancel:
      sound: "BLOCK_PRESSURE_PLATE_CLICK_ON"
      volume: 1.0
      pitch: 1.0
  messages:
    only-players: "&cOnly players can use this command."
    disabled: "&cHomes are disabled."
    invalid-name: "{prefix} &cбҙҳКҹбҙҮбҙҖкңұбҙҮ бҙңкңұбҙҮ бҙҸЙҙКҹКҸ КҹбҙҮбҙӣбҙӣбҙҮКҖкңұ, ЙҙбҙңбҙҚКҷбҙҮКҖкңұ, _ бҙҖЙҙбҙ… -."
    max-homes: "{prefix} &cКҸбҙҸбҙң бҙҖКҹКҖбҙҮбҙҖбҙ…КҸ КңбҙҖбҙ бҙҮ бҙӣКңбҙҮ бҙҚбҙҖxЙӘбҙҚбҙңбҙҚ бҙҸкң° &e%max% &cКңбҙҸбҙҚбҙҮs!"
