    not-found: "{prefix} &cЙҙбҙҸ КңбҙҸбҙҚбҙҮ ЙҙбҙҖбҙҚбҙҮбҙ… &e%home% &cкң°бҙҸбҙңЙҙбҙ…!"
    set: "{prefix} &aКңбҙҸбҙҚбҙҮ &e%home% &aКңбҙҖs КҷбҙҮбҙҮЙҙ sбҙҮбҙӣ! (&7%used%/&7%max% &aбҙңsбҙҮбҙ…)"
    deleted: "{prefix} &aКңбҙҸбҙҚбҙҮ &e%home% &aКңбҙҖs КҷбҙҮбҙҮЙҙ бҙ…бҙҮКҹбҙҮбҙӣбҙҮбҙ…."
    enter-name: "{prefix} &7бҙҳКҹбҙҮбҙҖкңұбҙҮ бҙҮЙҙбҙӣбҙҮКҖ бҙҖ ЙҙбҙҖбҙҚбҙҮ кң°бҙҸКҖ КҸбҙҸбҙңКҖ ЙҙбҙҮбҙЎ КңбҙҸбҙҚбҙҮ (&ccancel&7 бҙӣбҙҸ бҙ„бҙҖЙҙбҙ„бҙҮКҹ):"
    cancelled: "{prefix} &cКңбҙҸбҙҚбҙҮ sбҙҮбҙӣбҙӣЙӘЙҙЙў бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ…."
    teleport-start: "{prefix} &7бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣЙӘЙҙЙў ЙӘЙҙ &b%seconds% &7sбҙҮбҙ„бҙҸЙҙбҙ…s бҙӣбҙҸ КңбҙҸбҙҚбҙҮ &e%home%&7. &8(бҙ…бҙҸЙҙ'бҙӣ бҙҚбҙҸбҙ бҙҮ!)"
    teleport-cancelled: "{prefix} &cбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ… КҷбҙҮбҙ„бҙҖбҙңкңұбҙҮ КҸбҙҸбҙң бҙҚбҙҸбҙ бҙҮбҙ…!"
    teleported: "{prefix} &aбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣбҙҮбҙ… бҙӣбҙҸ КңбҙҸбҙҚбҙҮ &e%home%&a."
    actionbar-countdown: "&bбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣЙӘЙҙЙў ЙӘЙҙ &f%seconds% &bкңұбҙҮбҙ„бҙҸЙҙбҙ…кңұ..."
    actionbar-cancelled: "&cбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ… (бҙҚбҙҸбҙ бҙҮбҙ…)!"
    actionbar-teleported: "&aбҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣбҙҮбҙ…!"

# Rank behavior
ranks-settings:
