# ClearLag System
# Automatically removes dropped entities to reduce lag. Default: every 15 minutes.
clear-lag:
  enabled: true
  interval-seconds: 900
  warning-seconds:
    - 60
    - 30
    - 15
    - 5
    - 4
    - 3
    - 2
    - 1
  disabled-worlds: []
  remove:
    dropped-items: true
    experience-orbs: true
    projectiles: false
    falling-blocks: false
    primed-tnt: false
    vehicles: false
    # Keeps items that were renamed in an anvil or have a custom entity name.
    exclude-named-items: true
    # Example:
    # exclude-materials:
    #   - "DIAMOND"
    #   - "NETHERITE_INGOT"
    exclude-materials: []
  messages:
    no-permission: "&cYou don't have permission to use this command!"
    warning: "&7removing all of the items on the floor in &b%seconds% &7seconds."
    cleaned: "&8• &bᴄʟᴇᴀʀʟᴀɢ &8» &aRemoved &b%removed% &aitems/entities from the floor."
    manual-cleaned: "&8• &bᴄʟᴇᴀʀʟᴀɢ &8» &aStaff removed &b%removed% &aitems/entities from the floor."
    time-left: "&8• &bᴄʟᴇᴀʀʟᴀɢ &8» &7Next clear in &b%time%&7."
    reloaded: "&8• &bᴄʟᴇᴀʀʟᴀɢ &8» &aClearLag settings reloaded."

