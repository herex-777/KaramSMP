# Internal placeholders, usable inside this config even without PlaceholderAPI:
# %player%                    - Player name
# %displayname%               - Player display name
# %rank%                      - Player rank name
# %prefix%                    - Raw rank prefix from the ranks section
# %suffix%                    - Raw rank suffix from the ranks section
# %online%                    - Online player count
# %max_players%               - Server max player count
# %world%                     - Player world name
# %gamemode%                  - Player game mode
# %karamsmp_rank%             - Player rank name
# %karamsmp_ranks_prefix%     - Colored rank prefix
# %karamsmp_ranks_suffix%     - Colored rank suffix
# %karamsmp_rank_permissions% - Permissions granted by the active rank
#
# PlaceholderAPI placeholders registered by this plugin:
# %karamsmp_rank%
# %karamsmp_rank_name%
# %karamsmp_saved_rank%
# %karamsmp_ranks_prefix%
# %karamsmp_ranks_suffix%
# %karamsmp_rank_priority%
# %karamsmp_rank_permission%
# %karamsmp_rank_permissions%
# %karamsmp_online%
# %karamsmp_max_players%
# %karamsmp_world%
# %karamsmp_gamemode%